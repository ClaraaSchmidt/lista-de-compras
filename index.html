<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header"><img src="imagens/logo.png" alt=""></div>
    <h1>Compras da Semana</h1>
    <div class="shopping">
        <form action="">
            <input type="text" id="box-main" placeholder="Adicionar um novo item">
            <button id="button">Adicionar item</button>
        </form>
            <div class="item" id="item">
            <form action="" class="mini-space"><input type="checkbox" style="cursor: pointer;"></form>
            <div class="space">
                <p id="name-item" class="line-through">Pão de forma</p>
                <img src="imagens/trash.png" alt="" class="ico-trash-can">
            </div>
        </div>
        <div class=" alert hide ">
            <img src="imagens/alert.png" alt="" class="ico-alert mini-space">
            <div class="space">
                <p>Item removido da lista</p>
                <img src="imagens/close.png" alt="" class="close">
            </div>
        </div>
    </div>
</body>
</html>
