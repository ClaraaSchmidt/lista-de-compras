<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header"><img src="imagens/logo.png" alt=""></div>
    <h1>Compras da Semana</h1>
    <div class="shopping">
        <form action="">
            <input type="text" id="box-main" placeholder="Adicionar um novo item">
            <button id="button">Adicionar item</button>
        </form>
        <div class="item" id="item">
            <input type="checkbox">
            <p id="name-item">Pão de forma</p>
            <img src="" alt="" class="ico-trash-can">
        </div>
        <div class="hide alert">
            <img src="" alt="" class="alert-ico">
            <p>Item removido da lista</p>
            <img src="" alt="" class="quit">
        </div>
    </div>
</body>
</html>
